<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">

  <!-- dark background -->
  <rect width="1200" height="630" fill="#09080a"/>

  <!-- subtle border -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#272027" stroke-width="2"/>

  <!-- icon: 280x280 centered horizontally at x=460, y=90 -->
  <g transform="translate(460, 90)">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#877886"/>
        <stop offset="100%" stop-color="#41373f"/>
      </linearGradient>
      <clipPath id="c">
        <rect width="280" height="280" rx="98" ry="98"/>
      </clipPath>
    </defs>
    <!-- rounded square background -->
    <rect width="280" height="280" rx="98" ry="98" fill="url(#g)"/>
    <!-- N glyph: original is 200x200 viewBox, scale to 280x280 = factor 1.4, so translate(0,0) scale(1.4) -->
    <g clip-path="url(#c)" transform="scale(1.4)">
      <g fill="#bac9b4" stroke="#eeebe9" stroke-width="0.75"
         transform="matrix(12.659340659340659,0,0,12.659340659340659,11.256301949312402,190.007288644602)">
        <path d="M12.95-14.22L12.95 0L9.54 0L4.50-8.85L4.50 0L1.07 0L1.07-14.22L4.50-14.22L9.53-5.37L9.53-14.22Z"/>
      </g>
    </g>
  </g>

  <!-- NARA wordmark -->
  <text x="600" y="452"
        text-anchor="middle"
        font-family="Arial Black, Arial, ui-sans-serif, sans-serif"
        font-size="72"
        font-weight="900"
        letter-spacing="-3"
        fill="#eeebe9">NARA</text>

  <!-- protocol label -->
  <text x="600" y="490"
        text-anchor="middle"
        font-family="Courier New, Courier, monospace"
        font-size="22"
        fill="#877886"
        letter-spacing="2">protocol</text>

  <!-- tagline -->
  <text x="600" y="546"
        text-anchor="middle"
        font-family="Courier New, Courier, monospace"
        font-size="20"
        fill="#564e55">NARA rewards commitment, not attention.</text>

  <!-- domain -->
  <text x="600" y="598"
        text-anchor="middle"
        font-family="Courier New, Courier, monospace"
        font-size="15"
        fill="#3a333a">naraprotocol.io · live on Base</text>

</svg>
